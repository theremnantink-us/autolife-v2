name: Deploy to TimeWeb

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build Astro site
        run: npm run build
        working-directory: site
        env:
          DEPLOY_TARGET: timeweb
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_YANDEX_API_KEY: ${{ vars.PUBLIC_YANDEX_API_KEY }}
          PUBLIC_YANDEX_PLACE_ID: ${{ vars.PUBLIC_YANDEX_PLACE_ID }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # Deploy frontend (dist/) → autolife.ru/public_html/dist/
      - name: Deploy frontend via lftp
        timeout-minutes: 15
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/frontend.lftp <<'LFTP_EOF'
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set ftp:use-site-chmod no
          set ftp:use-mlsd no
          set ftp:use-mdtm no
          set net:timeout 60
          set net:idle-timeout 30
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set xfer:clobber yes
          LFTP_EOF
          echo "open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_SERVER\"" >> /tmp/frontend.lftp
          echo "mirror --reverse --no-perms --no-symlinks --verbose --parallel=2 --exclude-glob .git* --exclude-glob node_modules/ ./site/dist/ autolife.ru/public_html/dist/" >> /tmp/frontend.lftp
          echo "bye" >> /tmp/frontend.lftp
          timeout 840 lftp -f /tmp/frontend.lftp

      # Deploy PHP backend → autolife.ru/public_html/
      - name: Deploy PHP backend via lftp
        timeout-minutes: 5
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/backend.lftp <<'LFTP_EOF'
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set ftp:use-site-chmod no
          set ftp:use-mlsd no
          set ftp:use-mdtm no
          set net:timeout 60
          set net:idle-timeout 30
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set xfer:clobber yes
          LFTP_EOF
          echo "open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_SERVER\"" >> /tmp/backend.lftp
          echo "mirror --reverse --no-perms --no-symlinks --verbose --parallel=2 --exclude-glob .git* --exclude-glob .env --exclude-glob .env.* --exclude-glob dist/ ./public_html/ autolife.ru/public_html/" >> /tmp/backend.lftp
          echo "bye" >> /tmp/backend.lftp
          timeout 240 lftp -f /tmp/backend.lftp
