name: Deploy to TimeWeb

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build Astro site
        run: npm run build
        working-directory: site
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_YANDEX_API_KEY: ${{ vars.PUBLIC_YANDEX_API_KEY }}
          PUBLIC_YANDEX_PLACE_ID: ${{ vars.PUBLIC_YANDEX_PLACE_ID }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: List autolife.ru/ contents (verify webroot)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/list.lftp <<EOF
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set ftp:use-mlsd no
          set net:timeout 30
          open -u "$FTP_USER","$FTP_PASS" "$FTP_SERVER"
          cd autolife.ru
          pwd
          cls -la
          bye
          EOF
          timeout 60 lftp -f /tmp/list.lftp || echo "Listing failed/timed out"

      # Deploy frontend (dist/) → autolife.ru/public_html/dist/ on TimeWeb
      - name: Deploy frontend via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/frontend.lftp <<EOF
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set ftp:use-site-chmod no
          set ftp:use-mlsd no
          set net:timeout 60
          set net:max-retries 3
          open -u "$FTP_USER","$FTP_PASS" "$FTP_SERVER"
          mirror --reverse --delete --no-perms --no-symlinks --verbose --exclude-glob .git* --exclude-glob node_modules/ ./site/dist/ autolife.ru/public_html/dist/
          bye
          EOF
          lftp -f /tmp/frontend.lftp

      # Deploy PHP backend (public_html/) → autolife.ru/public_html/ on TimeWeb
      - name: Deploy PHP backend via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/backend.lftp <<EOF
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set ftp:use-site-chmod no
          set ftp:use-mlsd no
          set net:timeout 60
          set net:max-retries 3
          open -u "$FTP_USER","$FTP_PASS" "$FTP_SERVER"
          mirror --reverse --delete --no-perms --no-symlinks --verbose --exclude-glob .git* --exclude-glob .env --exclude-glob .env.* --exclude-glob dist/ ./public_html/ autolife.ru/public_html/
          bye
          EOF
          lftp -f /tmp/backend.lftp
